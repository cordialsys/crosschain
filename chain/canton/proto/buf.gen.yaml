version: v1
managed:
  enabled: true
  go_package_prefix:
    default: github.com/cordialsys/crosschain/chain/canton/types
plugins:
  - plugin: buf.build/protocolbuffers/go:v1.36.10
    out: ../types
    opt: paths=source_relative
  - plugin: buf.build/grpc/go:v1.5.1
    out: ../types
    opt: paths=source_relative
